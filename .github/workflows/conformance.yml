name: AIREP conformance

# A verifiability protocol whose own repo cannot prove its conformance kit is green is a
# contradiction. This runs the full kit on every push/PR, on two Python versions, with Node
# REQUIRED (the cross-runtime tests must not silently fall back to the Python-only path), and
# guards against example/producer drift.

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: spec/airep/v0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install jsonschema cryptography
      - name: Node must be present (cross-runtime tests must not skip)
        run: node --version
      - name: validate.py — full conformance battery (schema, neutrality, integrity, chain, tamper, profiles)
        run: python3 conformance/validate.py
      - name: test_jcs.py — Python<->Node RFC 8785 canonicalization agree byte-for-byte
        run: python3 conformance/test_jcs.py
      - name: test_verifier_parity.py — verify.py and verify.mjs reach the same verdict
        run: python3 conformance/test_verifier_parity.py
      - name: verify.mjs — independent Node verifier on the chain + signatures
        run: node conformance/verify.mjs examples/chain.jsonl --pubkey examples/test_public_key.txt
      - name: regenerate-drift guard — committed examples must round-trip the producer
        run: |
          python3 examples/regenerate.py
          if ! git diff --quiet -- examples/; then
            echo "::error::examples drifted after regenerate.py — committed examples do not match the producer"
            git --no-pager diff -- examples/
            exit 1
          fi

  producer-interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install jsonschema cryptography
      - name: Build + run the TypeScript producer
        working-directory: producers/typescript
        run: |
          npm install
          npm run build
          node dist/airep_producer.js > "$RUNNER_TEMP/ts_chain.jsonl"
          wc -l "$RUNNER_TEMP/ts_chain.jsonl"
      - name: Cross-stack interop — the TS-produced chain must pass BOTH reference verifiers
        run: |
          PUB=spec/airep/v0.1/examples/test_public_key.txt
          python3 spec/airep/v0.1/conformance/verify.py  "$RUNNER_TEMP/ts_chain.jsonl" --pubkey "$PUB"
          node     spec/airep/v0.1/conformance/verify.mjs "$RUNNER_TEMP/ts_chain.jsonl" --pubkey "$PUB"
